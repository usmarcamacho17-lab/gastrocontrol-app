<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230A0500'/%3E%3Crect x='3' y='3' width='94' height='94' rx='19' fill='none' stroke='%23C9A84C' stroke-width='4'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='58' font-weight='700' fill='%23C9A84C' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">
<title>GastroControl — Acceso</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow-x:hidden; -webkit-text-size-adjust:100%; }
* { box-sizing:border-box; }
body {
  background: #0E0E14;
  color: #E8E8F0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  width: 100%;
  max-width: 380px;
  background: #16121F;
  border: 1.5px solid #1E1A2E;
  border-radius: 24px;
  padding: 32px 26px;
}

.logo-wrap {
  width: 64px; height: 64px; border-radius: 18px;
  background: #0A0500; border: 2px solid #C9A84C;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 18px;
}

.titulo {
  text-align: center;
  font-size: 20px; font-weight: 900; color: #fff;
  letter-spacing: 0.5px; margin-bottom: 4px;
}
.subtitulo {
  text-align: center;
  font-size: 12px; color: #C9A84C; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 28px;
}

.campo-lbl { font-size: 12px; color: #5A4A7A; font-weight: 600; margin-bottom: 6px; }
.campo-wrap { margin-bottom: 16px; }
.campo {
  width: 100%; background: #0E0B18; border: 1.5px solid #1E1A2E;
  border-radius: 12px; color: #E8E8F0; font-size: 15px;
  padding: 14px 15px; outline: none; transition: border-color .15s;
}
.campo:focus { border-color: #C9A84C; }
.campo::placeholder { color: #2A2040; }

.btn-entrar {
  width: 100%; background: linear-gradient(135deg, #C9A84C, #A8883C);
  color: #000; border: none; border-radius: 14px;
  padding: 15px; font-size: 15px; font-weight: 800;
  cursor: pointer; margin-top: 8px; letter-spacing: 0.3px;
  transition: opacity .15s;
}
.btn-entrar:active { opacity: .8; }
.btn-entrar:disabled { opacity: .5; cursor: default; }

.msg-error {
  display: none;
  background: #E74C3C18; border: 1px solid #E74C3C44;
  border-radius: 10px; padding: 11px 14px;
  font-size: 12px; color: #FF8A7A; margin-bottom: 16px;
  text-align: center;
}
.msg-error.vis { display: block; }

.msg-bloqueado {
  display: none;
  background: #F0B42918; border: 1px solid #F0B42944;
  border-radius: 10px; padding: 13px 14px;
  font-size: 12px; color: #F0B429; margin-bottom: 16px;
  text-align: center; line-height: 1.5;
}
.msg-bloqueado.vis { display: block; }

.footer-txt {
  text-align: center; font-size: 10px; color: #2A2040;
  margin-top: 22px; letter-spacing: 0.5px;
}
.footer-brand { color: #C9A84C; font-weight: 800; letter-spacing: 2px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo-wrap">⚙️</div>
  <div class="titulo">GastroControl</div>
  <div class="subtitulo">Acceso a tu cuenta</div>

  <div class="msg-error" id="msg-error">Usuario o clave incorrectos</div>
  <div class="msg-bloqueado" id="msg-bloqueado">
    Tu acceso está pausado por falta de pago.<br>Contactá a tu asesor para reactivarlo.
  </div>

  <div class="campo-wrap">
    <div class="campo-lbl">Usuario</div>
    <input class="campo" id="usuario" type="text" placeholder="tu usuario" autocomplete="username">
  </div>
  <div class="campo-wrap">
    <div class="campo-lbl">Clave</div>
    <input class="campo" id="clave" type="password" placeholder="tu clave" autocomplete="current-password">
  </div>

  <button class="btn-entrar" id="btn-entrar" onclick="intentarLogin()">Entrar</button>

  <div class="footer-txt">
    <span class="footer-brand">GASTROCONTROL</span><br>
    No se trata de vender más. Se trata de ganar mejor.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mcknncjahkibnbgogmgb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fxgangMM5b2DmTp48aXEIg_ei_bhVgx';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

function ocultarMensajes(){
  document.getElementById('msg-error').classList.remove('vis');
  document.getElementById('msg-bloqueado').classList.remove('vis');
}

function calcularEstado(cliente){
  if(cliente.estado === 'bloqueado') return 'bloqueado';
  if(!cliente.fecha_ultimo_pago) return 'activo';
  const hoy = new Date();
  const venc = new Date(cliente.fecha_ultimo_pago);
  venc.setDate(venc.getDate() + 30);
  const dias = Math.ceil((venc - hoy) / (1000*60*60*24));
  if(dias < -5) return 'bloqueado';
  return 'activo'; // gracia también puede entrar, solo bloqueado corta el paso
}

async function intentarLogin(){
  ocultarMensajes();
  const usuario = document.getElementById('usuario').value.trim();
  const clave = document.getElementById('clave').value;
  const btn = document.getElementById('btn-entrar');

  if(!usuario || !clave){
    document.getElementById('msg-error').textContent = 'Completá usuario y clave';
    document.getElementById('msg-error').classList.add('vis');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verificando...';

  try{
    const resp = await fetch(
      `${SUPABASE_URL}/rest/v1/Clientes?usuario=eq.${encodeURIComponent(usuario)}&select=*`,
      { headers }
    );
    if(!resp.ok) throw new Error('Error de conexión');

    const resultados = await resp.json();

    if(resultados.length === 0 || resultados[0].clave !== clave){
      document.getElementById('msg-error').classList.add('vis');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    const cliente = resultados[0];
    const estado = calcularEstado(cliente);

    if(estado === 'bloqueado'){
      document.getElementById('msg-bloqueado').classList.add('vis');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    // Login correcto — guardar sesión y redirigir
    sessionStorage.setItem('gc_usuario', cliente.usuario);
    sessionStorage.setItem('gc_negocio', cliente.nombre_negocio);
    sessionStorage.setItem('gc_tipo_calc', cliente.tipo_calculadora || 'simple');
    window.location.href = 'mi-calculadora.html';

  } catch(err){
    document.getElementById('msg-error').textContent = 'Error de conexión. Probá de nuevo.';
    document.getElementById('msg-error').classList.add('vis');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

// Permitir Enter para enviar
document.getElementById('clave').addEventListener('keypress', function(e){
  if(e.key === 'Enter') intentarLogin();
});
</script>
</body>
</html>
